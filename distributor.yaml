env:
  APP_NAME: "lords messenger"

releases:
  - name: production
    jobs:
      # macOS DMG Release
      - name: release-macos
        package:
          platform: macos
          target: dmg
          build_args:
            obfuscate: false

      # Windows EXE Release
      - name: release-windows
        package:
          platform: windows
          target: exe
          build_args:
            obfuscate: false
